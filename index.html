<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente moderna de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Únete a nosotros</h2>
            <p>Completa tus datos para registrarte</p>
        </div>

        <form id="google-form">
            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan" required>
            </div>

            <div class="input-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ej. Pérez" required>
            </div>

            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="juan@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="celular" placeholder="Ej. +57 300 123 4567" required>
            </div>

            <button type="submit" id="submit-btn">
                <span class="btn-text">Enviar Datos</span>
                <div class="loader" id="loader" style="display: none;"></div>
            </button>

            <div id="status-message" class="status-message"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
